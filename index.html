<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Configuraçaõ de Fontes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style/style.css">
    <title>CosmoTrip</title>
</head>

<body>

    <header>
        <img src="./assets/images/Logo.svg" alt="Logo da CosmoTrip">

        <nav class="container-nav-header">
          <ul>
            <li><a href=""><span>Início</span></a></li>
            <li><a href="">Destinos</a></li>
            <li><a href="">Pacotes</a></li>
            <li><a href="">Contato</a></li>
          </ul>
        </nav>

        <nav>
            <a href="" class="btn-header">Reserve sua viagem</a>
        </nav>

    </header>

    <main>
        <div class="container-main">

            <div class="container-main-text">
                <img src="./assets/images/decoration-circle.svg" alt="Circulo decorativo">
                <span>Início</span>
            </div>

            <h1>Sua próxima viagem pode ser para fora <span>deste mundo!</span></h1>
            <p>Explore Marte, Saturno, Júpiter e além com conforto e segurança.</p>
            <nav>
                <a class="btn-primary" href="">Explorar destinos</a>
                
                <div class="container-main-btn">
                    <img src="./assets/images/icon-rocket.svg" alt="Imagem de um foguete">
                    <a class="btn-secondary" href=""> Ver pacotes</a>
                </div>
                
            </nav>
        </div>

        <div>
            <img src="./assets/images/illustration-hero.svg" alt="Imagem de um planeta">
        </div>

    </main>


</body>

</html>
